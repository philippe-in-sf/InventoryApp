<svg width="1800" height="1050" viewBox="0 0 1800 1050" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity="0.13"/>
    </filter>
    <style>
      .label{font-family:Inter, Arial, sans-serif;font-size:22px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
      .title{font-family:Inter, Arial, sans-serif;font-size:42px;font-weight:850;letter-spacing:0}
      .body{font-family:Inter, Arial, sans-serif;font-size:22px;font-weight:500;letter-spacing:0}
      .small{font-family:Inter, Arial, sans-serif;font-size:16px;font-weight:700;letter-spacing:0}
      .tiny{font-family:Inter, Arial, sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
      .metric{font-family:Inter, Arial, sans-serif;font-size:34px;font-weight:850;letter-spacing:0}
      .cardTitle{font-family:Inter, Arial, sans-serif;font-size:20px;font-weight:850;letter-spacing:0}
      .cardBody{font-family:Inter, Arial, sans-serif;font-size:15px;font-weight:600;letter-spacing:0}
    </style>
  </defs>

  <rect width="1800" height="1050" fill="#E9E5DD"/>
  <text x="70" y="75" fill="#1F2623" class="title">Inventory App: Three Theme Directions</text>
  <text x="70" y="114" fill="#68736D" class="body">Same product, different emotional signals and UI treatment.</text>

  <!-- Estate Ledger -->
  <g transform="translate(70 160)">
    <rect width="520" height="810" rx="32" fill="#F6F3EE" filter="url(#shadow)"/>
    <text x="34" y="58" fill="#C8774A" class="label">Option 1</text>
    <text x="34" y="110" fill="#1F2623" class="title">Estate Ledger</text>
    <text x="34" y="145" fill="#68736D" class="body">Quiet, premium, insurance-ready.</text>

    <rect x="34" y="185" width="452" height="178" rx="22" fill="#173F3C"/>
    <circle cx="78" cy="229" r="24" fill="#C8774A"/>
    <text x="70" y="238" fill="#FFFDF9" class="small">I</text>
    <text x="340" y="233" fill="#F2E4BF" class="small">Local first</text>
    <text x="60" y="288" fill="#FFFDF9" class="title" font-size="31">Know what you own.</text>
    <text x="60" y="323" fill="#D8E2DF" class="body" font-size="18">Catalog rooms, books, electronics, and valuables.</text>

    <g transform="translate(34 395)">
      <rect width="138" height="110" rx="14" fill="#DCE9DF" stroke="#C7D9CC"/>
      <text x="18" y="28" fill="#68736D" class="tiny">Value</text>
      <text x="18" y="68" fill="#1F2623" class="metric">$0</text>
      <rect x="157" width="138" height="110" rx="14" fill="#DCE5EC" stroke="#C5D4DF"/>
      <text x="175" y="28" fill="#68736D" class="tiny">Items</text>
      <text x="175" y="68" fill="#1F2623" class="metric">12</text>
      <rect x="314" width="138" height="110" rx="14" fill="#F2E4BF" stroke="#DECE9F"/>
      <text x="332" y="28" fill="#68736D" class="tiny">Sync</text>
      <text x="332" y="68" fill="#1F2623" class="metric">0</text>
    </g>

    <rect x="34" y="535" width="452" height="205" rx="22" fill="#FFFDF9" stroke="#DED7CC"/>
    <text x="58" y="577" fill="#1F2623" class="cardTitle">Recently added</text>
    <line x1="58" y1="604" x2="462" y2="604" stroke="#DED7CC"/>
    <circle cx="80" cy="638" r="18" fill="#F3DFD1"/><text x="74" y="644" fill="#C8774A" class="small">B</text>
    <text x="112" y="635" fill="#1F2623" class="cardTitle">Dune</text><text x="112" y="658" fill="#68736D" class="cardBody">Book · ISBN saved locally</text><text x="405" y="647" fill="#215C58" class="small">$18</text>
    <circle cx="80" cy="698" r="18" fill="#F3DFD1"/><text x="74" y="704" fill="#C8774A" class="small">E</text>
    <text x="112" y="695" fill="#1F2623" class="cardTitle">Sony Receiver</text><text x="112" y="718" fill="#68736D" class="cardBody">Electronics · UPC</text><text x="390" y="707" fill="#215C58" class="small">$125</text>

    <g transform="translate(34 770)">
      <rect width="70" height="22" rx="11" fill="#215C58"/><rect x="82" width="70" height="22" rx="11" fill="#FFFDF9" stroke="#DED7CC"/><rect x="164" width="70" height="22" rx="11" fill="#FFFDF9" stroke="#DED7CC"/>
    </g>
  </g>

  <!-- Modern Utility -->
  <g transform="translate(640 160)">
    <rect width="520" height="810" rx="32" fill="#F7F9FB" filter="url(#shadow)"/>
    <text x="34" y="58" fill="#2563EB" class="label">Option 2</text>
    <text x="34" y="110" fill="#111827" class="title">Modern Utility</text>
    <text x="34" y="145" fill="#64748B" class="body">Fast, crisp, app-store polished.</text>

    <rect x="34" y="185" width="452" height="178" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="58" y="210" width="52" height="52" rx="16" fill="#2563EB"/>
    <path d="M78 236h13m-7-7v14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <rect x="356" y="218" width="96" height="30" rx="15" fill="#DBEAFE"/><text x="374" y="238" fill="#2563EB" class="small">Online</text>
    <text x="58" y="307" fill="#111827" class="title" font-size="31">Capture inventory fast.</text>
    <rect x="58" y="326" width="148" height="40" rx="13" fill="#2563EB"/><text x="91" y="352" fill="#fff" class="small">Scan item</text>
    <rect x="218" y="326" width="148" height="40" rx="13" fill="#FFFFFF" stroke="#CBD5E1"/><text x="246" y="352" fill="#2563EB" class="small">Add manual</text>

    <g transform="translate(34 395)">
      <rect width="138" height="110" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="18" y="28" fill="#64748B" class="tiny">Value</text>
      <text x="18" y="68" fill="#111827" class="metric">$0</text>
      <rect x="157" width="138" height="110" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="175" y="28" fill="#64748B" class="tiny">Items</text>
      <text x="175" y="68" fill="#111827" class="metric">12</text>
      <rect x="314" width="138" height="110" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="332" y="28" fill="#64748B" class="tiny">Sync</text>
      <text x="332" y="68" fill="#111827" class="metric">0</text>
    </g>

    <rect x="34" y="535" width="452" height="205" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="58" y="577" fill="#111827" class="cardTitle">Items</text>
    <rect x="372" y="554" width="82" height="30" rx="15" fill="#ECFDF5"/><text x="390" y="574" fill="#0F766E" class="small">Filter</text>
    <line x1="58" y1="604" x2="462" y2="604" stroke="#E2E8F0"/>
    <rect x="62" y="620" width="38" height="38" rx="12" fill="#DBEAFE"/><text x="75" y="645" fill="#2563EB" class="small">B</text>
    <text x="116" y="635" fill="#111827" class="cardTitle">Dune</text><text x="116" y="658" fill="#64748B" class="cardBody">Books · local</text><text x="405" y="647" fill="#2563EB" class="small">$18</text>
    <rect x="62" y="680" width="38" height="38" rx="12" fill="#CCFBF1"/><text x="75" y="705" fill="#0F766E" class="small">E</text>
    <text x="116" y="695" fill="#111827" class="cardTitle">Sony Receiver</text><text x="116" y="718" fill="#64748B" class="cardBody">Electronics · UPC</text><text x="390" y="707" fill="#2563EB" class="small">$125</text>

    <g transform="translate(34 770)">
      <rect width="70" height="22" rx="7" fill="#2563EB"/><rect x="82" width="70" height="22" rx="7" fill="#E2E8F0"/><rect x="164" width="70" height="22" rx="7" fill="#E2E8F0"/>
    </g>
  </g>

  <!-- Collector Studio -->
  <g transform="translate(1210 160)">
    <rect width="520" height="810" rx="32" fill="#F4EFE7" filter="url(#shadow)"/>
    <text x="34" y="58" fill="#8A5CF6" class="label">Option 3</text>
    <text x="34" y="110" fill="#241F1C" class="title">Collector Studio</text>
    <text x="34" y="145" fill="#6F625A" class="body">Personal, visual, collection-oriented.</text>

    <rect x="34" y="185" width="452" height="178" rx="26" fill="#3B2F2A"/>
    <rect x="60" y="212" width="64" height="82" rx="9" fill="#D6A85A"/><rect x="72" y="224" width="40" height="48" rx="4" fill="#F4EFE7" opacity=".55"/>
    <rect x="362" y="218" width="92" height="30" rx="15" fill="#EEE7FF"/><text x="381" y="238" fill="#8A5CF6" class="small">Studio</text>
    <text x="58" y="326" fill="#FFF7ED" class="title" font-size="31">Curate every piece.</text>
    <text x="58" y="354" fill="#E8DCCF" class="body" font-size="18">Books, art, electronics, objects, stories.</text>

    <g transform="translate(34 395)">
      <rect width="138" height="110" rx="22" fill="#FFFFFF" stroke="#E1D6C9"/>
      <text x="18" y="28" fill="#6F625A" class="tiny">Value</text>
      <text x="18" y="68" fill="#241F1C" class="metric">$0</text>
      <rect x="157" width="138" height="110" rx="22" fill="#FFFFFF" stroke="#E1D6C9"/>
      <text x="175" y="28" fill="#6F625A" class="tiny">Pieces</text>
      <text x="175" y="68" fill="#241F1C" class="metric">12</text>
      <rect x="314" width="138" height="110" rx="22" fill="#FFFFFF" stroke="#E1D6C9"/>
      <text x="332" y="28" fill="#6F625A" class="tiny">Sets</text>
      <text x="332" y="68" fill="#241F1C" class="metric">3</text>
    </g>

    <rect x="34" y="535" width="452" height="205" rx="26" fill="#FFFFFF" stroke="#E1D6C9"/>
    <text x="58" y="577" fill="#241F1C" class="cardTitle">Collection shelf</text>
    <line x1="58" y1="604" x2="462" y2="604" stroke="#E1D6C9"/>
    <rect x="62" y="620" width="40" height="48" rx="7" fill="#D6A85A"/><text x="117" y="635" fill="#241F1C" class="cardTitle">Dune</text><text x="117" y="658" fill="#6F625A" class="cardBody">First shelf · science fiction</text><text x="405" y="647" fill="#8A5CF6" class="small">$18</text>
    <rect x="62" y="682" width="40" height="40" rx="14" fill="#EEE7FF"/><text x="75" y="707" fill="#8A5CF6" class="small">E</text>
    <text x="117" y="695" fill="#241F1C" class="cardTitle">Sony Receiver</text><text x="117" y="718" fill="#6F625A" class="cardBody">Audio cabinet · vintage</text><text x="390" y="707" fill="#8A5CF6" class="small">$125</text>

    <g transform="translate(34 770)">
      <rect width="70" height="22" rx="11" fill="#8A5CF6"/><rect x="82" width="70" height="22" rx="11" fill="#D6A85A"/><rect x="164" width="70" height="22" rx="11" fill="#3B2F2A"/>
    </g>
  </g>
</svg>
